# AgentMail nginx reverse proxy
# Place in: /etc/nginx/sites-available/agentmail
# Enable: ln -s /etc/nginx/sites-available/agentmail /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name agentmail.cdnsoft.net;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name agentmail.cdnsoft.net;

    # SSL — managed by certbot:
    # sudo certbot --nginx -d agentmail.cdnsoft.net
    ssl_certificate /etc/letsencrypt/live/agentmail.cdnsoft.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agentmail.cdnsoft.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3210;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
